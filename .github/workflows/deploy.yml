name: Build e Deploy para Servidor

on:
  push:
    branches:
      - main  # Ou o nome da branch que você quer que dispare o deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências e Build
        run: |
          npm install
          npm run build

      - name: Deploy para o servidor via SCP
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SSH_PORT: "2233"
          ARGS: "-rltgoDzvO --delete --rsh='ssh -p 2233 -o StrictHostKeyChecking=no'"
          ARGS: "-rltgoDzvO --delete"
          SOURCE: "dist/"
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          TARGET: "/var/www/nossohorario/"

